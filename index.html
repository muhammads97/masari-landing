<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Masari — Smart Expense Tracking</title>

    <style>
      :root {
        --primary: #1e7f5c;
        --primaryLight: #e6f4ef;
        --accentGreen: #2fbf71;
        --white: #ffffff;
        --background: #f8faf9;
        --primaryText: #0f172a;
        --secondaryText: #475569;
        --mutedText: #94a3b8;
        --borderLight: #e2e8f0;
        --borderGreen: #cfede3;
      }

      body {
        margin: 0;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: var(--background);
        color: var(--primaryText);
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        padding: 20px;
        text-align: center;
      }

      .card {
        max-width: 640px;
        background: var(--white);
        border: 1px solid var(--borderLight);
        border-radius: 14px;
        padding: 48px 36px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.04);
      }

      h1 {
        margin: 0;
        font-size: 2.4rem;
        color: var(--primary);
        letter-spacing: -0.5px;
      }

      h2 {
        margin: 10px 0 25px;
        font-weight: 500;
        color: var(--secondaryText);
      }

      p {
        line-height: 1.6;
        color: var(--secondaryText);
        margin-bottom: 28px;
      }

      .badge {
        display: inline-block;
        background: var(--primaryLight);
        color: var(--primary);
        padding: 6px 14px;
        border-radius: 999px;
        font-size: 0.8rem;
        font-weight: 600;
        margin-bottom: 18px;
      }

      .btn {
        background: var(--primary);
        color: white;
        padding: 12px 24px;
        border-radius: 8px;
        text-decoration: none;
        font-weight: 600;
        transition: 0.2s ease;
        display: inline-block;
      }

      .btn:hover {
        background: #17684c;
      }

      .links {
        margin-top: 36px;
        font-size: 0.9rem;
      }

      .links a {
        color: var(--mutedText);
        text-decoration: none;
        margin: 0 12px;
      }

      .links a:hover {
        color: var(--primary);
      }
    </style>
  </head>

  <body>
    <div class="card">
      <div class="badge">Beta Launch Soon</div>

      <h1>Masari</h1>
      <h2>AI-powered expense tracking</h2>

      <p>
        Capture expenses effortlessly and understand your money with clarity.
        Masari is built for simplicity, automation, and shared financial
        visibility.
      </p>

      <a class="btn" href="#">Join Beta Soon</a>

      <div class="links">
        <a href="/terms">Terms</a>
        <a href="/privacy">Privacy</a>
      </div>
    </div>
  </body>
</html>
